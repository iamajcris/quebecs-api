# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Functions on merge
'on':
  workflow_dispatch:
  push:
    branches:
      - feature/*
    paths:
      - 'functions/**'
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Create service account file
        run: |
          mkdir -p functions/config
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}" > functions/config/service-account-key.json
      - name: Build Cloud Functions
        run: cd functions && npm install
      - name: 'Deploy Clound Functions'
        run: 'cd functions && npm run deploy'