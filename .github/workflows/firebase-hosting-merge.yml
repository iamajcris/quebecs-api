# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Functions on merge
'on':
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Create service account file
        run: |
          mkdir -p functions/config
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}" > functions/config/service-account-key.json
      - name: Set Google Application Credentials
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/functions/config/service-account-key.json" >> $GITHUB_ENV
      - name: Build Cloud Functions
        run: cd functions && npm install
      - name: 'Deploy Clound Functions'
        run: 'cd functions && npm run deploy'