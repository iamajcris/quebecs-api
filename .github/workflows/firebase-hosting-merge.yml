# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Functions on merge
'on':
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Create service account file from env vars
        run: node scripts/setup-env.js
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_ID: ${{ secrets.FIREBASE_CLIENT_ID }}
          FIREBASE_AUTH_URI: ${{ vars.FIREBASE_AUTH_URI }}
          FIREBASE_TOKEN_URI: ${{ vars.FIREBASE_TOKEN_URI }}
          FIREBASE_AUTH_PROVIDER_CERT_URL: ${{ vars.FIREBASE_AUTH_PROVIDER_CERT_URL }}
          FIREBASE_CLIENT_X509_CERT_URL: ${{ vars.FIREBASE_CLIENT_X509_CERT_URL }}
      - name: Set Google Application Credentials
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/functions/config/service-account-key.json" >> $GITHUB_ENV
      - name: Build Cloud Functions
        run: cd functions && npm install
      - name: 'Deploy Clound Functions'
        run: cd functions && firebase deploy --only functions --token "${{ secrets.FIREBASE_TOKEN }}"